<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Be My Friend 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Will you be my friend again? 🥺</h1>

  <div class="gifts">
    <div class="gift red">🎁</div>
    <div class="gift blue">🎁</div>
  </div>

  <!-- ✅ Buttons container -->
  <div class="buttons">
    <button id="yes">Yes 💖</button>
    <button id="maybe">Maybe 🤔</button>
    <button id="no">No ❌</button>
  </div>

  <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
